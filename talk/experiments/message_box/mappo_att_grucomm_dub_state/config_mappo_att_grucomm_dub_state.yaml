# MessageBox MAPPO with shared pre-attention GRU actor/critic + state reconstruction
total_timesteps: 1e6
num_envs: 64
num_steps_per_env_per_update: 128
num_epochs: 4
num_minibatches: 4

gamma: 0.99
gae_lambda: 0.95
clip_eps: 0.2
ent_coef: 0.01
recon_coef: 1.0
activation: tanh
fc_dim_size: 64
gru_hidden_size: 64

lr_actor: 3.0e-4
lr_critic: 3.0e-4
anneal_lr: true
max_grad_norm: 0.5

stop_neighbor_msg_grad: false

# Environment
num_agents: 4
max_steps: 10
reward_correct: 1.0
reward_wrong: -1.0
include_agent_id: true

seed: 0
num_seeds: 3

# wandb
project: talk
algorithm: mappo_att_grucomm_dub_state
custom_name: ""
use_wandb: true
