# Team-shared MAPPO + Talk-Codebook communication on JaxMARL MPE
total_timesteps: 1.0e7
num_envs: 128
num_steps_per_env_per_update: 64
num_epochs: 4
num_minibatches: 4

gamma: 0.99
gae_lambda: 0.95
clip_eps: 0.2
scale_clip_eps: false
ent_coef: 0.01
vf_coef: 0.5
activation: relu
fc_dim_size: 128
gru_hidden_size: 128

# Talk-Codebook message dims
sig_dim: 16              # query / key (signature) dim
codebook_size: 1         # M: number of codebook slots per agent
vocab_dim: 32            # d_vocab: dimensionality of each codebook vector (comm value dim)
gumbel_tau: 1.0          # ST-Gumbel temperature for codebook-index selection
aux_coef: 0.0            # weight on the codebook-alignment auxiliary loss
eval_every: 1            # run the receiver-side test-return rollout every N updates
trajectory_scan_unroll: 8

# -1 = unlimited ally comm; otherwise Euclidean radius in MPE world units
comm_range: -1

lr_actor: 5.0e-4
lr_critic: 1.0e-3
anneal_lr: true
max_grad_norm: 0.5

seed: 0
num_seeds: 3

project: talk
environment: mpe
env_name: MPE_simple_spread_v3
env_kwargs: {}
num_agents: null
sight_range: -1.0
algorithm: mappo_talk_v2
custom_name: "_new_mpe"
talk_config: "_1_code_no_h_aux"
use_wandb: true

log_rollout_videos: true
log_rollout_fractions: [0.0, 0.33, 0.66, 1.0]
rollout_length_multiplier: 1.0
rollout_eval_seed: 0
